<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi amor</title>
    <style>
        body{ 
            margin: 0;
            background: linear-gradient(to top, #0a0a0a, #1a0033, #330066);
            color: white; font-family: 'Arial', sans-serif;
            overflow: hidden; }
        canvas { display: block; }
        #contador {
            position: absolute; bottom: 50px; width: 100%; text-align: center;
            font-size: 24px; pointer-events: none; text-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="contador">Nuestro tiempo juntos: <span id="tiempo"></span></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Guardar posiciones de ramas
const ramas = [];
let corazones = [];

// Crear estrellas una sola vez
const estrellas = [];
for (let i = 0; i < 100; i++) {
    estrellas.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 1,
        twinkle: Math.random() * 1000
    });
}

// Dibujar estrellas con parpadeo
function drawStars() {
    const tiempo = Date.now() / 500;
    for (let e of estrellas) {
        const brillo = 0.5 + Math.sin(tiempo + e.twinkle) * 0.5;
        ctx.fillStyle = `rgba(255,255,255,${brillo})`;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Función para dibujar el árbol y guardar ramas
function drawTree(x, y, len, angle, branchWidth) {
    const x2 = x + Math.cos(angle * Math.PI / 180) * len;
    const y2 = y + Math.sin(angle * Math.PI / 180) * len;

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = "#5d4037";
    ctx.lineWidth = branchWidth;
    ctx.stroke();

    if (len > 20) {
        ramas.push({ x: x2, y: y2 });
        drawTree(x2, y2, len * 0.7, angle - 25, branchWidth * 0.7);
        drawTree(x2, y2, len * 0.7, angle + 25, branchWidth * 0.7);
    }
}

function drawGrass() {
    ctx.fillStyle = "#145214"; // verde oscuro
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 50);
    for (let x = 0; x <= canvas.width; x += 50) {
        const y = canvas.height - 50 - Math.sin(x / 50) * 10; // ondulación
        ctx.lineTo(x, y);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.closePath();
    ctx.fill();
}

// Dibujar corazón
function drawHeart(x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size / 20, size / 20);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-10, -10, -20, 10, 0, 20);
    ctx.bezierCurveTo(20, 10, 10, -10, 0, 0);
    ctx.fillStyle = "red";
    ctx.fill();
    ctx.restore();
}

// Generar corazones según días
function generarCorazones(dias) {
    corazones = [];
    const cantidad = dias * 1; // 1 corazón por día
    for (let i = 0; i < cantidad; i++) {
        const rama = ramas[Math.floor(Math.random() * ramas.length)];
        corazones.push({
            baseX: rama.x + (Math.random() * 20 - 10),
            baseY: rama.y + (Math.random() * 20 - 10),
            size: Math.random() * 10 + 8,
            offset: Math.random() * 1000
        });
    }
}

// Contador de tiempo
function actualizarContador() {
    const inicio = new Date('2026-06-20T00:00:00');
    const ahora = new Date();
    const diff = ahora - inicio;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const segs = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('tiempo').innerText = `${dias}d ${horas}h ${mins}m ${segs}s`;

    if (corazones.length !== dias * 1) {
        generarCorazones(dias);
    }
}

// Animación
function animar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawStars();
    drawGrass();
    ramas.length = 0;
    drawTree(canvas.width / 2, canvas.height - 100, 200, -90, 12);

    const tiempo = Date.now() / 500;
    for (let c of corazones) {
        const xOsc = Math.sin(tiempo + c.offset) * 3;
        const yOsc = Math.cos(tiempo + c.offset) * 2;
        const latido = c.size + Math.sin(tiempo * 2 + c.offset) * 2; // efecto de latido
        drawHeart(c.baseX + xOsc, c.baseY + yOsc, latido);
    }

    actualizarContador();
    requestAnimationFrame(animar);
}

animar();
</script>
</body>
</html>
